events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting zone for auth service
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    server {
        listen 80;
        server_name localhost;
        root /var/www/html;
        index index.php;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Media Storage
        location /uploads/ {
            alias /var/www/html/uploads/;
            expires 7d;
            access_log off;
        }

        # Assets (CSS, JS)
        location /assets/ {
            alias /var/www/html/frontend/public/assets/;
            expires 7d;
            access_log off;
        }

        # WebSocket Reverse Proxy
        location /ws/ {
            proxy_pass http://websocket:8080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Auth Service Routing (with Rate Limiting on Login)
        location /api/v1/auth/login {
            limit_req zone=auth_limit burst=5 nodelay;
            include fastcgi_params;
            fastcgi_pass auth-service:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/html/services/auth-service/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        location /api/v1/auth {
            include fastcgi_params;
            fastcgi_pass auth-service:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/html/services/auth-service/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        # Profile Service Routing
        location /api/v1/profiles {
            include fastcgi_params;
            fastcgi_pass profile-service:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/html/services/profile-service/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        # Discovery Service Routing
        location /api/v1/discovery {
            include fastcgi_params;
            fastcgi_pass discovery-service:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/html/services/discovery-service/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        # Subscription Service Routing
        location /api/v1/subscriptions {
            include fastcgi_params;
            fastcgi_pass subscription-service:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/html/services/subscription-service/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        # Chat Service Routing
        location /api/v1/chats {
            include fastcgi_params;
            fastcgi_pass chat-service:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/html/services/chat-service/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        # Notification Service Routing
        location /api/v1/notifications {
            include fastcgi_params;
            fastcgi_pass notification-service:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/html/services/notification-service/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        # Media Service Routing
        location /api/v1/media {
            include fastcgi_params;
            fastcgi_pass media-service:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/html/services/media-service/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        # Activity Service Routing
        location /api/v1/activity {
            include fastcgi_params;
            fastcgi_pass activity-service:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/html/services/activity-service/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        # Moderation Service Routing
        location /api/v1/moderation {
            include fastcgi_params;
            fastcgi_pass moderation-service:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/html/services/moderation-service/public/index.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        # Frontend Routing (Fallback for all non-API and static routes)
        location / {
            include fastcgi_params;
            fastcgi_pass auth-service:9000; # Use any of the PHP containers to render the UI
            fastcgi_param SCRIPT_FILENAME /var/www/html/frontend/public/index.php;
            fastcgi_param PATH_INFO $uri;
        }
    }
}
